<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo - Terra</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #000;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Container principal com efeito de baixa exposição */
    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0a0a1a 0%, #000 70%);
    }

    /* Terra girando */
    .earth-container {
      position: absolute;
      width: 320px;
      height: 320px;
      animation: spin 40s linear infinite;
      filter: brightness(0.45) contrast(1.1) saturate(0.8);
      /* baixa exposição + tom meio frio */
    }

    .earth {
      width: 100%;
      height: 100%;
      background: url('https://www.pngall.com/wp-content/uploads/2016/04/Earth-PNG-File.png') center/cover no-repeat;
      border-radius: 50%;
      box-shadow: 
        inset 0 0 80px rgba(0,0,0,0.9),
        0 0 120px rgba(0, 80, 180, 0.15);
      /* sombra interna + glow azul bem sutil */
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Card de texto */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 20, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.8rem 4rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      text-align: center;
      max-width: 90%;
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 300;
      letter-spacing: 8px;
      background: linear-gradient(90deg, #e0e0ff, #ffffff, #c0c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.6rem;
    }

    p {
      font-size: 1.4rem;
      opacity: 0.85;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="earth-container">
      <div class="earth"></div>
    </div>

    <div class="card">
      <h1>Olá Mundo</h1>
      <p>daqui da Terra</p>
    </div>
  </div>

</body>
</html>
