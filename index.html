<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo - Terra</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #000;
      color: #0f0;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 320px;
      height: 320px;
      perspective: 1000px; /* dá sensação de profundidade */
    }

    .earth {
      width: 100%;
      height: 100%;
      background: url('https://www.nasa.gov/sites/default/files/thumbnails/image/main_image_galaxies_stephans_quintet_sq_nircam_miri_webb.png') no-repeat center center;
      background-size: cover;
      border-radius: 50%;
      box-shadow: 
        inset 0 0 80px 20px rgba(0,0,0,0.9),    /* escurece bastante o planeta */
        0 0 60px 10px rgba(0, 180, 255, 0.15); /* leve brilho azul ao redor */
      animation: rotate 60s linear infinite;
      transform-style: preserve-3d;
    }

    /* Efeito de rotação */
    @keyframes rotate {
      from {
        transform: rotateY(0deg);
      }
      to {
        transform: rotateY(360deg);
      }
    }

    h1 {
      margin-top: 40px;
      font-size: 3.5rem;
      text-shadow: 0 0 20px #0f0;
      letter-spacing: 6px;
    }

    p {
      margin-top: 10px;
      font-size: 1.3rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="earth"></div>
  </div>

  <h1>Olá Mundo</h1>
  <p>2026 - A Terra ainda gira...</p>

</body>
</html>
