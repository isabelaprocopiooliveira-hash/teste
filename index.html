<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minecraft – Noite com Creeper e Grama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'VT323', monospace;
      background: #0a0e1f;           /* céu noturno escuro */
      color: #e0e0e0;
      image-rendering: pixelated;
    }

    /* Estrelas animadas */
    .stars {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 70px 70px, 50px 50px;
      background-position: 0 0, 35px 35px;
      opacity: 0.75;
      pointer-events: none;
      animation: twinkle 25s infinite alternate;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.9; }
    }

    /* Lua */
    .moon {
      position: fixed;
      top: 10%;
      right: 12%;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle at 35% 35%, #f0f8ff, #c0d0ff 45%, #8090ff);
      border-radius: 50%;
      box-shadow: 0 0 60px #a0c0ff, 0 0 120px #6080ff;
      opacity: 0.92;
      pointer-events: none;
    }

    /* Grama no chão */
    .ground {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
      background: url('https://i.imgur.com/5y5p9.png') repeat-x bottom; /* textura de grama clássica (topo) */
      background-size: 64px 64px;
      image-rendering: pixelated;
      pointer-events: none;
    }

    .ground::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #2a4d1a 0%, transparent 40%);
      opacity: 0.4;
    }

    .container {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 10;
    }

    .title {
      position: absolute;
      top: 6%;
      font-size: 7.5rem;
      color: #fff;
      text-shadow: 10px 10px 0 #000, -10px -10px 0 #000;
      -webkit-text-stroke: 6px #000;
      letter-spacing: 8px;
      opacity: 0.8;
      pointer-events: none;
    }

    .button {
      padding: 1.5rem 6rem;
      font-size: 4rem;
      font-family: 'VT323', monospace;
      color: white;
      background: #4a4a4a;
      border: 12px solid #777;
      border-top-color: #aaa;
      border-left-color: #aaa;
      border-bottom-color: #222;
      border-right-color: #222;
      box-shadow: 0 12px 0 #111;
      cursor: pointer;
      transition: all 0.1s;
      user-select: none;
      text-shadow: 4px 4px 0 #000;
    }

    .button:hover {
      background: #606060;
      transform: translateY(-6px);
      box-shadow: 0 18px 0 #111;
    }

    .button:active {
      transform: translateY(8px);
      box-shadow: 0 4px 0 #111;
    }

    /* Creeper grande no fundo */
    .creeper-big {
      position: fixed;
      bottom: 20%;
      left: 8%;
      width: 320px;
      height: 320px;
      background: url('https://www.vhv.rs/dpng/d/427-4274215_transparent-minecraft-creeper-png-minecraft-creeper-clipart-black.png') center/contain no-repeat;
      opacity: 0.22;
      pointer-events: none;
      transform: scaleX(-1); /* vira pro lado direito */
      animation: creeperSway 18s infinite ease-in-out;
    }

    /* Creeper menor no lado direito */
    .creeper-small {
      position: fixed;
      bottom: 28%;
      right: 10%;
      width: 180px;
      height: 180px;
      background: url('https://www.vhv.rs/dpng/d/427-4274215_transparent-minecraft-creeper-png-minecraft-creeper-clipart-black.png') center/contain no-repeat;
      opacity: 0.35;
      pointer-events: none;
      animation: creeperSway 14s infinite ease-in-out reverse;
    }

    @keyframes creeperSway {
      0%, 100% { transform: translateX(0) scaleX(-1); }
      50%      { transform: translateX(40px) scaleX(-1); }
    }

    small {
      position: absolute;
      bottom: 2rem;
      font-size: 1.9rem;
      color: #777;
      opacity: 0.7;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="stars"></div>
  <div class="moon"></div>
  <div class="ground"></div>

  <!-- Creepers -->
  <div class="creeper-big"></div>
  <div class="creeper-small"></div>

  <div class="container">
    <h1 class="title">MINECRAFT</h1>

    <div class="button">JOGAR SINGLEPLAYER</div>
  </div>

  <small>Cuidado... tem Creeper por aí • Noite no Overworld</small>

</body>
</html>
