<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minecraft – Estilo Clássico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'VT323', monospace;
      background: linear-gradient(to bottom, #4a7cac 0%, #6ca0d7 40%, #a8d0ff 100%);
      color: #e0e0e0;
      image-rendering: pixelated;
      background-image:
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><rect width="32" height="32" fill="%23284a6e"/><rect x="32" y="32" width="32" height="32" fill="%23284a6e"/></svg>');
      background-size: 64px 64px;
    }

    .container {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .title {
      font-size: 8rem;
      color: #fff;
      text-shadow: 
        6px 6px 0 #000,
        -6px -6px 0 #000,
        6px -6px 0 #000,
        -6px 6px 0 #000;
      -webkit-text-stroke: 4px #000;
      letter-spacing: 8px;
      line-height: 0.9;
      margin-bottom: 1rem;
      animation: float 4s ease-in-out infinite;
    }

    .subtitle {
      font-size: 3.2rem;
      color: #feca3c;
      text-shadow: 4px 4px 0 #000;
      -webkit-text-stroke: 2px #000;
      margin-bottom: 4rem;
    }

    .menu {
      background: #3c3c3c;
      border: 8px solid #555;
      border-top-color: #777;
      border-left-color: #777;
      box-shadow: 0 0 0 8px #222;
      padding: 2.5rem 4rem;
      border-radius: 12px;
      min-width: 420px;
      text-align: center;
    }

    .button {
      display: block;
      width: 100%;
      padding: 1.2rem;
      margin: 1rem 0;
      font-size: 2.4rem;
      font-family: 'VT323', monospace;
      color: white;
      background: #535353;
      border: 6px solid #8b8b8b;
      border-bottom-color: #2f2f2f;
      border-right-color: #2f2f2f;
      box-shadow: 0 6px 0 #222;
      cursor: pointer;
      transition: all 0.08s;
      user-select: none;
    }

    .button:hover {
      background: #6b6b6b;
      transform: translateY(2px);
      box-shadow: 0 4px 0 #222;
    }

    .button:active {
      transform: translateY(6px);
      box-shadow: 0 0 0 #222;
    }

    .grass {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent 30%, #5e8c31 60%, #4a6c24);
      pointer-events: none;
    }

    .creeper-face {
      position: absolute;
      top: 10%;
      right: 10%;
      width: 180px;
      height: 180px;
      background: #0f0;
      border: 8px solid #000;
      box-shadow: 0 0 0 8px #222;
      opacity: 0.25;
      animation: fadeCreeper 12s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-20px); }
    }

    @keyframes fadeCreeper {
      0%, 100% { opacity: 0.15; }
      50%      { opacity: 0.4; }
    }

    small {
      margin-top: 3rem;
      font-size: 1.8rem;
      color: #aaa;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">MINECRAFT</h1>
    <p class="subtitle">Java Edition</p>

    <div class="menu">
      <div class="button">Jogar Singleplayer</div>
      <div class="button">Jogar Multiplayer</div>
      <div class="button">Minecraft Realms</div>
      <div class="button">Opções</div>
      <div class="button">Sair</div>
    </div>

    <small>Feito com blocos e muito amor pixelado • 2025</small>

    <!-- Creeper de fundo (só pra zuar) -->
    <div class="creeper-face"></div>
  </div>

  <div class="grass"></div>

</body>
</html>
