<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo - Terra</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      background: #000;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0a0a1a 0%, #000 70%);
      overflow: hidden;
    }

    /* Estrelas sutis de fundo */
    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 70px 70px, 50px 50px;
      background-position: 0 0, 35px 35px;
      opacity: 0.06; /* bem discreto */
      pointer-events: none;
      animation: twinkle 80s linear infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.06; }
      50%      { opacity: 0.09; }
    }

    /* Terra girando + pulso sutil */
    .earth-container {
      position: absolute;
      width: 320px;
      height: 320px;
      animation: 
        spin 50s linear infinite,
        pulse 18s ease-in-out infinite;
      filter: brightness(1.15) contrast(1.15) saturate(1.35);
    }

    .earth {
      width: 100%;
      height: 100%;
      background: url('https://www.pngall.com/wp-content/uploads/2016/04/Earth-PNG-File.png') center/cover no-repeat;
      border-radius: 50%;
      box-shadow:
        inset 0 0 80px rgba(0,0,0,0.9),
        0 0 120px rgba(0, 80, 180, 0.15);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50%      { transform: scale(1.035) rotate(180deg); }
    }

    /* Card de texto */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 20, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2.8rem 4rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
      text-align: center;
      max-width: 90%;
      opacity: 0;
      animation: fadeIn 3s ease-out 1s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 300;
      letter-spacing: 8px;
      background: linear-gradient(90deg, #e0e0ff, #ffffff, #c0c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.6rem;
    }

    p {
      font-size: 1.4rem;
      opacity: 0.85;
      letter-spacing: 2px;
    }

    /* Controles de áudio (opcional, pode remover) */
    #audio-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="earth-container">
      <div class="earth"></div>
    </div>
    <div class="card">
      <h1>Olá Mundo</h1>
      <!-- <p>Escutando o silêncio do cosmos...</p> --> <!-- opcional -->
    </div>
  </div>

  <!-- Áudio ambiente (loop, volume baixo) -->
  <audio id="ambientSound" loop autoplay>
    <source src="space-ambient.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

  <!-- Botão pra mutar/desmutar (opcional, mas recomendado) -->
  <button id="audio-control">🔊 Som on</button>

  <script>
    const audio = document.getElementById('ambientSound');
    const control = document.getElementById('audio-control');

    // Tenta tocar automaticamente (pode ser bloqueado por navegador)
    audio.volume = 0.15; // bem baixinho pra ficar de fundo

    // Controle manual
    control.addEventListener('click', () => {
      if (audio.paused || audio.muted) {
        audio.muted = false;
        audio.play().catch(() => {});
        control.textContent = '🔊 Som on';
      } else {
        audio.muted = true;
        control.textContent = '🔇 Som off';
      }
    });

    // Se o autoplay for bloqueado, o botão ajuda a iniciar
    audio.addEventListener('canplay', () => {
      audio.play().catch(() => {
        control.textContent = '🔇 Toque para ouvir';
      });
    });
  </script>
</body>
</html>
