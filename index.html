<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Espacial</title>
    <style>
        /* Reset básico e fundo preto */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do Planeta */
        .earth {
            position: absolute;
            width: 400px;
            height: 400px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/The_Blue_Marble_after_correction_for_atmospheric_effects.jpg/1024px-The_Blue_Marble_after_correction_for_atmospheric_effects.jpg');
            background-size: cover;
            border-radius: 50%;
            /* Efeito de sombra para parecer uma esfera iluminada */
            box-shadow: inset -40px -40px 50px 2px rgba(0, 0, 0, 0.9), 
                        0 0 20px rgba(52, 152, 219, 0.4);
            animation: rotateEarth 20s linear infinite;
            z-index: 1;
        }

        /* Card de Texto */
        .card {
            position: relative;
            z-index: 2; /* Garante que o texto fique na frente */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Efeito de vidro */
            padding: 2rem 4rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Animação de Rotação */
        @keyframes rotateEarth {
            from { background-position: 0 0; }
            to { background-position: 800px 0; }
        }
    </style>
</head>
<body>

    <div class="earth"></div>

    <div class="card">
        <h1>Olá Mundo</h1>
    </div>

</body>
</html>
