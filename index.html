<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo - Minecraft</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      background: #0d001a;
      color: #e0e0e0;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated; /* mantém o estilo pixel perfeito */
    }
    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1a0033 0%, #000 70%);
      overflow: hidden;
    }
    /* Estrelas + partículas estilo Minecraft (quadrados sutis) */
    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(#fff 1px, transparent 1px),
        radial-gradient(#88ff88 1px, transparent 1px);
      background-size: 60px 60px, 80px 80px;
      background-position: 0 0, 30px 30px;
      opacity: 0.08;
      pointer-events: none;
      animation: twinkle 120s linear infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.12; }
    }
    /* Overlay sutil de textura dirt/grass (opcional, dá vibe overworld) */
    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://www.transparenttextures.com/patterns/dirt.png') repeat;
      opacity: 0.04;
      pointer-events: none;
    }
    /* Planeta Minecraft-style */
    .earth-container {
      position: absolute;
      width: 340px;
      height: 340px;
      animation:
        spin 140s linear infinite,
        pulse 24s ease-in-out infinite;
      filter: brightness(1.1) contrast(1.2) saturate(1.4) drop-shadow(0 0 30px #4caf50);
    }
    .earth {
      width: 100%;
      height: 100%;
      background: url('https://www.pngwing.com/en/free-png-bxprj/download') center/cover no-repeat;
      /* Alternativas boas (testadas em 2026): */
      /* https://www.hiclipart.com/free-transparent-background-png-clipart-ijvcr (colorful planet minecraft style) */
      /* Ou use: https://static.wikia.nocookie.net/minecraft_gamepedia/images/2/2e/Earth.png (se disponível) */
      border-radius: 50%;
      image-rendering: pixelated;
      box-shadow:
        inset 0 0 60px #000,
        0 0 80px #4caf50aa,
        0 0 140px #2e7d32aa;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    /* Card estilo crafting table / placa de madeira */
    .card {
      position: relative;
      z-index: 10;
      background: linear-gradient(to bottom, #8b5a2b, #6d4c41);
      border: 6px solid #3e2723;
      border-image: url('https://minecraft.wiki/images/Wooden_Planks.png?format=original') 6 stretch;
      border-radius: 12px;
      padding: 2.5rem 4rem;
      box-shadow: 0 10px 40px #000000aa, inset 0 0 20px #00000088;
      text-align: center;
      max-width: 85%;
      opacity: 0;
      animation: fadeIn 3.5s ease-out 1.2s forwards;
      image-rendering: pixelated;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    h1 {
      font-size: 3.8rem;
      font-weight: normal;
      letter-spacing: 6px;
      color: #fff176;
      text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      color: #e0e0e0;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 1px;
    }
    /* Botão de áudio estilo botão do Minecraft */
    #audio-control {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: #8b5a2b;
      color: #fff;
      border: 4px solid #3e2723;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.9rem;
      box-shadow: 0 4px 0 #3e2723;
      transition: transform 0.1s;
    }
    #audio-control:active {
      transform: translateY(4px);
      box-shadow: 0 0 0 #3e2723;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="earth-container">
      <div class="earth"></div>
    </div>
    <div class="card">
      <h1>OLÁ MUNDO</h1>
      <!-- <p>Carregando chunks... ☁️</p> --> <!-- opcional, bem Minecraft -->
    </div>
  </div>

  <!-- Áudio ambiente Minecraft-style (C418 vibes) -->
  <audio id="ambientSound" loop autoplay>
    <source src="minecraft-ambient.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

  <button id="audio-control">🎵 Som on</button>

  <script>
    const audio = document.getElementById('ambientSound');
    const control = document.getElementById('audio-control');

    audio.volume = 0.18; // baixinho, como no jogo

    control.addEventListener('click', () => {
      if (audio.paused || audio.muted) {
        audio.muted = false;
        audio.play().catch(() => {});
        control.textContent = '🎵 Som on';
      } else {
        audio.muted = true;
        control.textContent = '🔇 Som off';
      }
    });

    audio.addEventListener('canplay', () => {
      audio.play().catch(() => {
        control.textContent = '🔇 Toque para ouvir';
      });
    });
  </script>
</body>
</html>
