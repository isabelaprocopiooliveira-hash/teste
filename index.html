<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .earth {
      width: 280px;
      height: 280px;
      background: url('https://svs.gsfc.nasa.gov/vis/a000000/a004500/a004550/BlueMarble_starfield_4k_2160p30_v2.00001_print.jpg') center/cover;
      border-radius: 50%;
      box-shadow: 
        inset 0 0 90px 30px rgba(0,0,0,0.85), /* escurece bastante */
        0 0 70px 15px rgba(0, 140, 255, 0.12); /* leve glow */
      animation: spin 80s linear infinite;
    }

    h1 {
      color: white;
      font-size: 4.5rem;
      margin: 50px 0 0;
      text-shadow: 0 0 15px rgba(255,255,255,0.4);
      letter-spacing: 4px;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }
  </style>
</head>
<body>

  <div class="earth"></div>
  <h1>Olá Mundo</h1>

</body>
</html>
