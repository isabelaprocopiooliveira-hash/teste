<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo - Terra 3D</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .scene {
      width: 300px;
      height: 300px;
      perspective: 1200px;           /* Quanto menor, mais "esmagado" o 3D */
    }

    .earth-container {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: rotate3d 90s linear infinite;  /* Rotação suave em 90 segundos */
    }

    .earth {
      width: 100%;
      height: 100%;
      position: absolute;
      border-radius: 50%;
      background: url('https://www.nasa.gov/wp-content/uploads/2023/11/blackmarble_2016.png') center/cover no-repeat;
      box-shadow: 
        inset 0 0 120px 40px rgba(0,0,0,0.8),     /* Escurece bordas internas */
        inset 30px -30px 80px 20px rgba(0,0,0,0.6),
        0 0 80px 20px rgba(0, 120, 255, 0.15);   /* Glow azul suave */
      transform: rotateX(25deg);                   /* Inclina um pouco para parecer mais 3D */
    }

    @keyframes rotate3d {
      from {
        transform: rotateY(0deg);
      }
      to {
        transform: rotateY(360deg);
      }
    }

    h1 {
      color: white;
      font-size: 5rem;
      margin: 60px 0 0;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
      letter-spacing: 5px;
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="earth-container">
      <div class="earth"></div>
    </div>
  </div>

  <h1>Olá Mundo</h1>

</body>
</html>
