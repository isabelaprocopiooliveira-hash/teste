<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* Planeta de fundo */
    .earth-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1564053489986-0d7a6d1266b3?w=1200&q=80') center center / cover no-repeat;
      opacity: 0.08;           /* bem discreto */
      pointer-events: none;
      animation: rotate 180s linear infinite;
      transform-origin: center;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* Card central */
    .card {
      position: relative;
      z-index: 2;
      padding: 3.5rem 5rem;
      background: rgba(10, 10, 20, 0.65);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(100, 140, 255, 0.12);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
      text-align: center;
      min-width: 380px;
    }

    h1 {
      font-size: 5.8rem;
      font-weight: 300;
      letter-spacing: 0.4rem;
      background: linear-gradient(90deg, #a0d8ef, #ffffff, #c9d9ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(140, 180, 255, 0.4);
    }

    .subtitle {
      margin-top: 1.2rem;
      font-size: 1.4rem;
      opacity: 0.7;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="earth-bg"></div>

  <div class="card">
    <h1>Olá Mundo</h1>
    <div class="subtitle">2026 edition</div>
  </div>

</body>
</html>
