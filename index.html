<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo - Minecraft Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background-image: url('https://i.imgur.com/9Z8Z8Z8.png'); /* Textura oficial de Dirt do Minecraft */
            background-repeat: repeat;
            background-size: 64px; /* Tamanho perfeito da textura 16x16 upscaled */
            image-rendering: pixelated; /* Mantém o estilo pixelado do Minecraft */
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Overlay escuro para o texto ficar legível (igual no Minecraft) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffffff;
            text-shadow: 
                3px 3px 0 #000,
                -3px -3px 0 #000,
                3px -3px 0 #000,
                -3px 3px 0 #000;
        }

        h1 {
            font-size: 4.5rem;
            margin-bottom: 20px;
            color: #ffcc00; /* Cor amarela clássica do Minecraft */
            text-shadow: 
                4px 4px 0 #000,
                -4px -4px 0 #000,
                4px -4px 0 #000,
                -4px 4px 0 #000;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        .botao-minecraft {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(#8f8f8f, #5f5f5f);
            color: white;
            font-size: 1.8rem;
            border: 8px solid #000;
            border-image: url('https://i.imgur.com/0k0k0k0.png') 8; /* Borda estilo botão Minecraft */
            text-decoration: none;
            box-shadow: 0 8px 0 #222;
            transition: all 0.1s;
            image-rendering: pixelated;
        }

        .botao-minecraft:hover {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #222;
        }

        .botao-minecraft:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #222;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OLÁ MUNDO!</h1>
        <p> Bem-vindo ao Minecraft em HTML + CSS </p>
        <a href="#" class="botao-minecraft">JOGAR AGORA</a>
    </div>
</body>
</html>
