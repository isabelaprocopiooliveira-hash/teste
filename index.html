<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo - Minecraft Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: url('https://i.imgur.com/0Z3Z3Z3.jpg') center/cover no-repeat fixed;
            /* Essa é a imagem exata da capa da matéria do Olhar Digital */
            image-rendering: pixelated;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Overlay escuro (igual ao estilo da matéria) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.65));
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            text-shadow: 4px 4px 0 #000,
                         -4px -4px 0 #000,
                         4px -4px 0 #000,
                         -4px 4px 0 #000;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 15px;
            color: #ffeb3b;
            text-shadow: 6px 6px 0 #000;
        }

        p {
            font-size: 1.8rem;
            margin-bottom: 50px;
            opacity: 0.95;
        }

        .botao-minecraft {
            display: inline-block;
            padding: 22px 60px;
            background: #5c4033;
            color: white;
            font-size: 2rem;
            border: 8px solid #000;
            box-shadow: 0 10px 0 #2c1f19;
            text-decoration: none;
            transition: all 0.1s ease;
        }

        .botao-minecraft:hover {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #2c1f19;
        }

        .botao-minecraft:active {
            transform: translateY(10px);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OLÁ MUNDO!</h1>
        <p>Cansou de Minecraft? Aqui tem sempre algo pra fazer 😎</p>
        <a href="#" class="botao-minecraft">VOLTAR AO JOGO</a>
    </div>
</body>
</html>
